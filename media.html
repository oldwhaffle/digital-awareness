<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Media — Digital Awareness</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">

  <a href="index.html">
    <img src="assets/logo/logo-white.png" class="logo">
  </a>

  <nav class="nav">
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT</a>
    <a href="media.html" class="active">MEDIA</a>
     <a href="press.html">PRESS</a>
    <a href="contact.html">CONTACT</a>
  </nav>

  <a href="#" class="cta">BOOK DA</a>

</header>


<!-- DA TV -->
<section class="da-tv">

  <div class="tv-wrap">

    <!-- glow behind -->
    <div class="tv-glow"></div>

    <!-- video layer -->
    <video
      id="tv-screen"
      autoplay
      muted
      loop
      playsinline
    >
      <source src="assets/media/header-loop.mp4" type="video/mp4">
    </video>

    <!-- crt frame -->
    <img src="assets/crt/crt-2.png" class="tv-frame">

  </div>

  <!-- controls -->
  <div class="tv-controls">
    <button onclick="randomChannel()">RANDOM</button>
  </div>

</section>


<!-- CLIP GRID -->
<section class="media-grid">

  <div class="media-item" onclick="changeChannel(0)">
    <img src="assets/media/thumbnail1.png" loading="lazy">
  </div>

  <div class="media-item" onclick="changeChannel(1)">
    <img src="assets/media/thumbnail2.png" loading="lazy">
  </div>

  <div class="media-item" onclick="changeChannel(2)">
    <img src="assets/media/thumbnail3.png" loading="lazy">
  </div>

  <div class="media-item" onclick="changeChannel(3)">
    <img src="assets/media/thumbnail4.png" loading="lazy">
  </div>

  <div class="media-item" onclick="changeChannel(4)">
    <img src="assets/media/thumbnail5.png" loading="lazy">
  </div>

  <div class="media-item" onclick="changeChannel(5)">
    <img src="assets/media/thumbnail6.png" loading="lazy">
  </div>

</section>



<!-- CTA -->
<section class="footer-cta">

  <h2>BOOK DIGITAL AWARENESS</h2>
  <p>digitalawareness4u@gmail.com</p>

</section>


<!-- JS -->
<script>
const channels = [
  "VIDEO_ID_1",
  "VIDEO_ID_2",
  "VIDEO_ID_3",
  "VIDEO_ID_4",
  "VIDEO_ID_5",
  "VIDEO_ID_6"
];

function changeChannel(index){
  const id = channels[index];
  document.getElementById("tv-screen").src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&controls=1&loop=1&playlist=${id}`;
}

function randomChannel(){
  const i = Math.floor(Math.random() * channels.length);
  changeChannel(i);
}
</script>

</body>
</html>
