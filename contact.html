<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact — Digital Awareness</title>
<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <a href="index.html">
    <img src="assets/logo/logo-white.png" class="logo">
  </a>

  <nav class="nav">
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT</a>
    <a href="media.html">MEDIA</a>
    <a href="press.html">PRESS</a>
    <a href="contact.html" class="active">CONTACT</a>
  </nav>

<a href="contact.html" class="book-btn">Book DA</a></header>


<section class="contact-minimal">

  <h1>BOOK DA</h1>

  <p class="contact-hook">
    Book Digital Awareness for your next gig.
  </p>

  <form
    action="https://formspree.io/f/xxxxabcd"
    method="POST"
    class="contact-form"
  >

    <input type="text" name="name" placeholder="Your name" required>

    <input type="email" name="email" placeholder="Your email" required>

    <input type="text" name="event" placeholder="Event / band name">

    <input type="text" name="location" placeholder="Venue / city">

    <input type="text" name="date" placeholder="Event date">

    <textarea name="message" placeholder="Details (setup, vibe, anything important)" rows="5"></textarea>

    <button type="submit">SEND INQUIRY</button>

  </form>

  <p class="contact-alt">
    or email: <a href="mailto:digitalawareness4u@gmail.com">digitalawareness4u@gmail.com</a>
  </p>

</section>

</body>
</html>
